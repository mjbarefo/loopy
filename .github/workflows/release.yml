name: Release

# RC-first: cut v0.x.y-rc.1 (published as a prerelease), soak it, then cut
# v0.x.y. The pipeline is identical; only the prerelease flag differs.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Gate
        run: |
          test -z "$(gofmt -l cmd internal)"
          go vet ./...
          go test ./... -count=1

      - name: Build archives
        run: scripts/dist.sh "$GITHUB_REF_NAME"

      - name: Generate homebrew formula
        run: scripts/homebrew-formula.sh "$GITHUB_REF_NAME" > dist/loopy.rb

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-rc.*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" $prerelease \
            --title "loopy $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS dist/loopy.rb
