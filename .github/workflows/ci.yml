name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Race test
        run: go test -race ./...

      - name: Build
        run: CGO_ENABLED=0 go build ./cmd/loopy

      - name: PTY smoke test the monitor
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q expect
          make tui-smoke

      - name: Cross-compile release targets
        run: |
          for target in "darwin amd64" "darwin arm64" "linux amd64" "linux arm64" "windows amd64" "windows arm64"; do
            read -r GOOS GOARCH <<<"$target"
            echo "building $GOOS/$GOARCH"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -o /dev/null ./cmd/loopy
          done
